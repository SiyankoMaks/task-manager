{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow-lg mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>

    <form action="{{ url_for('auth.register') }}" method="POST" class="space-y-4">
        <input type="text" name="username" placeholder="Username" 
               class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-400" required>
        <input type="email" name="email" placeholder="Email" 
               class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-400" required>
        <input type="password" name="password" placeholder="Password" 
               class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-400" required>
        <button type="submit" 
                class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition">
            Register
        </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
        Already have an account? 
        <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline">Login</a>
    </p>
</div>
{% endblock %}
