<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">Task Manager</h1>

        <div>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('tasks.tasks_page') }}" class="mr-4 hover:underline">Tasks</a>
                <a href="{{ url_for('auth.logout') }}" class="hover:underline">Logout</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="mr-4 hover:underline">Login</a>
                <a href="{{ url_for('auth.register') }}" class="hover:underline">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="container mx-auto p-4">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="space-y-2 mb-4">
                    {% for msg in messages %}
                        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-2 rounded shadow animate-fade-in">
                            {{ msg }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fade-in 0.5s ease forwards;
        }
    </style>

</body>
</html>
